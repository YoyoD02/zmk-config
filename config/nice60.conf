# config/toutou!68.conf

# config/boards/shields/toutou!68/toutou!68.conf

# 键盘名称（硬件默认）
CONFIG_ZMK_KEYBOARD_NAME="toutou!68-BT"

# 底层系统与内存保护
CONFIG_ARM_MPU=y
CONFIG_PINCTRL=y

# GPIO 核心配置（必须完整开启）
CONFIG_GPIO=y
# CONFIG_GPIO_OUTPUT=y
# CONFIG_GPIO_INPUT=y
# CONFIG_GPIO_INTERRUPT=y
CONFIG_ZMK_LED=y
CONFIG_ZMK_LED_GPIO=y

# 固件格式与存储
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BUILD_OUTPUT_UF2=y

# 设置存储（NVS）支持（用于保存蓝牙配对、偏好等）
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# 连接方式（同时支持USB和蓝牙）
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# RGB 底灯硬件支持（如果键盘有 WS2812 灯珠，必须开启）
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# 电池服务（广播电量信息，如果键盘有电池建议开启）
CONFIG_BT_BAS=y

# 推荐的去抖时间（可根据实际轴体手感，在用户配置中微调）
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# 蓝牙时钟配置（确保连接稳定性，基于 nRF 系列主控）
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# --- RGB 效果与颜色偏好 ---
# 初始色调（160 = 蓝色系)
# 初始灯效编号（3 = 呼吸灯等，具体取决于固件）
# 开机即开启 RGB 底灯
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# --- 省电与闲置 ---
# 闲置超时时间（300000 毫秒 = 5 分钟）
# 进入闲置状态后自动关闭 RGB
# 启用深度睡眠以进一步省电
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_SLEEP=y

# --- 按键与输入 ---
# 启用 NKRO（全键无冲）报告模式
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# --- 蓝牙增强 ---
# 增加 BLE 发射功率（增强信号，更远距离但稍增功耗）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# 修复 Windows 电量通知导致的连接中断（设为 n 关闭订阅强制）
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n